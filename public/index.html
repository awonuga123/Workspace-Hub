<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workspace Hub - Premium Workspace Setup</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <h1 class="logo">✨ Workspace Hub</h1>
      <div class="nav-links">
        <button class="cart-btn" onclick="toggleCart()">
          🛒 Cart <span id="cartCount" class="cart-count">0</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <!-- Sidebar with Filters -->
    <aside class="sidebar">
      <h2>Categories</h2>
      <div class="filter-group">
        <button class="filter-btn active" onclick="filterProducts('all')">All Products</button>
        <button class="filter-btn" onclick="filterProducts('furniture')">Furniture</button>
        <button class="filter-btn" onclick="filterProducts('peripherals')">Peripherals</button>
        <button class="filter-btn" onclick="filterProducts('monitors')">Monitors</button>
        <button class="filter-btn" onclick="filterProducts('lighting')">Lighting</button>
        <button class="filter-btn" onclick="filterProducts('accessories')">Accessories</button>
      </div>
    </aside>

    <!-- Products Grid -->
    <main class="products-section">
      <div style="margin-bottom: 10px;">
        <h2>Premium Workspace Products</h2>
        <p style="color: #6b7280; margin-top: 4px;">Discover premium furniture, peripherals, and accessories for your ideal workspace</p>
      </div>
      <div id="productsGrid" class="products-grid"></div>
    </main>
  </div>

  <!-- Shopping Cart Modal -->
  <div id="cartModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="toggleCart()">&times;</span>
      <h2>Shopping Cart</h2>
      <div id="cartItems" class="cart-items"></div>
      <div class="cart-summary">
        <h3>Order Summary</h3>
        <p>Subtotal: <span id="subtotal">$0.00</span></p>
        <p>Tax (10%): <span id="tax">$0.00</span></p>
        <p class="total">Total: <span id="total">$0.00</span></p>
      </div>
      <div class="checkout-section">
        <input type="text" id="customerName" placeholder="Your Name" />
        <input type="email" id="customerEmail" placeholder="Your Email" />
        <button class="btn-checkout" onclick="checkout()">Proceed to Checkout</button>
      </div>
    </div>
  </div>

  <!-- Success Modal -->
  <div id="successModal" class="modal">
    <div class="modal-content modal-success">
      <h2>✅ Order Confirmed!</h2>
      <p id="successMessage"></p>
      <button onclick="closeSuccessModal()" class="btn-primary">Continue Shopping</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
